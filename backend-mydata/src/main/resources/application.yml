spring:
  application:
    name: finntech-mydata
  profiles:
    default: h2
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  # Flyway는 기본 비활성 — dev(h2)는 ddl-auto:update로 스키마 확장 자동 반영(비파괴).
  # mysql 프로파일에서만 활성화해 버전 마이그레이션(V1~V6)이 그릇을 만든다(Phase 6).
  flyway:
    enabled: false

# 본체(8080)와 다른 포트로 마이데이터 제공자 서버를 띄운다.
server:
  port: 8082

# 헬스체크(W5-2) — 컨테이너/오케스트레이터용. /actuator/health만 노출(공유시크릿 필터는 /bank/**만 막으므로 통과).
management:
  endpoints:
    web:
      exposure:
        include: health

mydata:
  # 서버간 인증(W7-2): /bank/** 호출에 요구할 공유 시크릿(env MYDATA_SHARED_SECRET). 본체가 X-MyData-Token으로 보낸다.
  # 미설정이면 dev(h2)는 강제하지 않고 통과, 운영(mysql)은 SharedSecretRequiredGuard가 기동을 막는다(fail-fast).
  shared-secret: ${MYDATA_SHARED_SECRET:}

  # '알 수 없는 PG 결제' 추가 작업(§13-11) — true로 1회 기동하면 UnknownPgPaymentRunner가 전 사용자에게
  # PG사 경유 미상 결제를 가끔씩 주입한다(멱등). 상시 false.
  unknown-pg:
    enabled: false

  # 조회 커트오프(§13-11): 결제일 ≤ now 만 반환한다. 미래 날짜로 미리 생성해둔 결제는
  # now가 그 시점을 지나면 등장해 '실시간 연동'처럼 보인다.
  #   reference(기본) = 시드 기준일의 하루 끝 → 현재 데이터 전부 노출·결정론적
  #   system          = 실시간(LocalDateTime.now())
  #   <ISO datetime>  = 그 시각으로 고정(데모 시간여행), 예: 2026-08-01T00:00:00
  now: reference

  seed:
    # 결정론 더미 생성 시드 (규칙 3: 재현성). 같은 시드+기준일이면 항상 같은 데이터.
    enabled: true
    # keep(기본) = 데이터 있으면 건너뜀. replace = 기존 사용자·카드·결제를 지우고 새로 생성(페르소나 교체 대비, §13-11).
    # 카탈로그(카드사·상품·혜택)는 두 경우 모두 재사용(없을 때만 생성).
    mode: keep
    seed: 20260721
    # 결제내역 생성 기준일(이 날짜로부터 과거 N일). now()를 직접 읽지 않아 재현 가능.
    reference-date: 2026-07-23   # 데모 기준일=오늘(앱 사용 시점 07-23). 커트오프(mydata.now=reference)가 이 날 끝까지 노출.
    payment-window-days: 120
    users: 12
    cards-per-user-min: 3
    cards-per-user-max: 6
    payments-per-card-min: 20
    payments-per-card-max: 60

  # 향후 Faker 대량 생성 계획(§13-11) — 준비용 스펙 자리. 현재 미구현·미실행(데이터 추가 안 함).
  # 실제 생성은 외부 Faker 파이프라인이 이 값을 참고해 페르소나별 프로파일 + 과거~미래 결제를 만들어 DB에 적재한다.
  generation:
    enabled: false
    # §13-11 개선: 결제 빈도 상향(하루 3건+) 후 total은 target-count 상한이 정한다. 사용자 수를 줄여
    # 재생성·재학습을 빠르게 — target 2M ÷ 사용자당 ~1,500건 ≈ 1,330명(시작일 62일 → 하루 ~21명).
    target-count: 2000000
    # now(=mydata.now, 2026-07-21) 기준 미래 생성 일수.
    future-window-days: 120
    # 각 사용자 이력 시뮬레이션 일수(§13-11 개선). 커트오프(07-21) 이전 ~6개월 이력을 확보하려면
    # 시작일(~2026-01) + 280일 ≈ 2026-10 까지 생성 → 커트오프 이전 6~7개월 가시 + 이후 일부 미래(실시간).
    history-days: 280
    personas: [절약형, 균형형, 과소비형, 구독과다형, 외식형]
    # 사용자 시작일(가입) 조건 — 매일 단위. 커트오프(07-21) 기준 ~6개월 전부터 시작해 6개월치 이력을 갖게 한다
    # (개선: 기존 07-01~09-01은 가시 이력이 ~3주뿐이라 건수가 너무 적었음). 낭비 하강곡선을 각자 시작일에 앵커.
    start-date:
      from: 2025-12-15
      to: 2026-02-15
      granularity: DAILY
    # 기본 페르소나 5종 → 각 수십 변형 프로파일(파라미터 섭동). 프로파일을 여러 사용자·시작일로 인스턴스화.
    persona:
      base-count: 5
      variants-per-base: 40
    # 다층 랜덤성 — "모두 같은 곡선 형태" 금지. 범위 [min,max]는 사용자/날별로 표본추출.
    randomness:
      curve:                          # 사용자별 낭비곡선 편차(전체는 하락해도 개인은 제각각)
        start-amplitude: [0.6, 1.4]   # 초기 낭비 강도(처음에 더 쓰는 사람 존재)
        decline-rate: [0.3, 1.2]      # 개선 속도(빠름~거의 안 내려감)
        min-phase-days: [20, 45]      # 최저점 시기(일) 편차
        rebound-strength: [0.0, 0.4]  # 반등 크기 편차
        plateau-level: [0.4, 0.8]     # 플래토 수준 상향(0.2~0.6→0.4~0.8) — 하강 후에도 낭비가 충분히 남게(더 많은 낭비)
        no-improvement-prob: 0.08     # 개선 안 하는(평탄/악화) 사용자 비율 — 서비스 효과로 대다수 개선
        early-overshoot-prob: 0.20    # 초반에 오히려 더 쓰는 사용자 비율
      day:                            # 날별 급증/급감
        cheat-day-prob: 0.05          # 갑자기 많이 쓰는 날 확률
        cheat-day-multiplier: [2.0, 5.0]
        quiet-day-prob: 0.15          # 거의 안 쓰는 날 확률(§13-11: 0.25→0.15, 하루 최소 ~3건 빈도 확보)
      amount:                         # 거래별 흔들림
        sigma-log: [0.20, 0.30]       # 카테고리 내 금액 산포(≤0.30 캡)
        out-of-profile-prob: 0.08     # 프로파일 밖 지출 확률
    # 취미 성향 — 사용자마다 취미(공연·여행·반려동물·디지털·쇼핑 등, hobbies.json) 배정.
    # 그 취미 category2에서 '가끔이지만 명백한' 지출을 주입 → 마이데이터에서 성향 식별.
    hobby:
      per-user: [1, 3]                # 사용자당 취미 수
      purchases-per-month: [0.5, 3.0] # 취미별 월 지출 건수(가끔이지만 뚜렷)
    # 낭비/필수 라벨 — 재량(discretionary) ≠ 낭비(waste). 낭비는 '충동·과다·후회성'에서만.
    #   생존필수 무대 = 낭비 아님 / 재량 무대 = 충동성 요인으로 p_waste / 본인 취미(비과다) = 보호.
    #   재량성 점수는 무대 판정에만 쓰고 p_waste에 직접 넣지 않는다.
    # 개선(§13-11): 기존 라벨이 너무 보수적이라 낭비 비율이 ~15.9%로 낮았음 → 충동성 가중치·기본확률을 상향해
    # 낭비를 훨씬 더 많이 라벨링한다(재량≠낭비 원칙과 취미 보호는 유지, 무대 판정은 불변).
    label:
      essential-categories: [대형마트, 편의점, 약국, 대중교통, 철도, 고속버스, 통신비, 공과금, 주유소, 통행료]
      base-waste-prob: 0.04           # 필수 무대 기본 낭비 확률(0.02→0.04)
      hobby-protection: 0.45          # 취미 억제 완화(0.2→0.45) — 취미도 충동·과다면 낭비 쪽
      impulse:                        # '충동·과다·후회'를 만드는 요인(재량성은 여기 없음) — 전반 상향
        night-hours: [23, 4]          # 심야(23~익일4시) 충동 신호
        night-weight: 0.55            # 0.35→0.55
        unplanned-weight: 0.45        # 0.25→0.45 정기/구독 아닌 즉흥
        excess-amount-multiplier: 1.5 # 2.0→1.5 (평소 1.5배↑면 과다로 봄 — 더 자주 발화)
        excess-weight: 0.45           # 0.30→0.45 과다
        freq-spike-weight: 0.20       # (WasteLabeler 미사용 — 값만 유지)
        delivery-overuse-weight: 0.40 # 0.25→0.40 배달 과다
        subscription-leak-weight: 0.45 # 0.30→0.45 구독 누수
    # 데이터 분리(과적합 방지, 요구11): 사용자 단위 disjoint 배분(합=1.0). 앱은 service만 시연.
    # 데이터 분리(과적합 방지, 요구11): 사용자 단위 disjoint 배분(합=1.0). 앱은 service만 시연.
    # 테스트 사용자는 ~10명이면 충분하므로 SERVICE 0.10(≈133명)로 원복 — train은 EBM 서브샘플(1.2M) 확보에 충분.
    split-ratios:
      train: 0.60
      val: 0.15
      test: 0.15
      service: 0.10
    # 카탈로그 리소스 경로(classpath). Stage A 산출물.
    catalog-path: classpath:generation/catalog/

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    # 본체와 분리된 별도 파일 DB. AUTO_SERVER로 외부 SQL 셸 접속 허용(시연·디버깅).
    url: jdbc:h2:file:./data/mydata;DB_CLOSE_DELAY=-1;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${MYDATA_DB_NAME:finntech_mydata}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:finntech}
    password: ${DB_PASSWORD}   # 운영 기본값 제거(W7-3) — 미설정 시 기동 실패(fail-fast). 로컬은 DB_PASSWORD=finntech 주입.
  # 운영 MySQL은 Flyway가 스키마의 단일 소유자. JPA는 검증만(생성 금지).
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate는 상시 켜지 않는다(빈 스키마를 baseline으로 오판 방지, W4-6).
    # 이미 ddl-auto로 만들어진 기존 DB를 Flyway로 채택할 때만 1회 CLI로 켠다:
    #   --spring.flyway.baseline-on-migrate=true --spring.flyway.baseline-version=5
    # (V1~V5가 이미 반영된 스키마이므로 baseline-version=5 → 재실행 없이 이력만 등록)
    # 빈 DB(신규 배포)는 이 설정으로 V1~V5를 처음부터 적용한다.
